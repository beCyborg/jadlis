name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'context/**'
      - 'research/**'
      - '.claude/**'
      - 'supabase/seed.sql'

concurrency:
  group: claude-review-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create MCP config
        run: |
          cat > "$RUNNER_TEMP/mcp-config.json" << 'EOF'
          {
            "mcpServers": {
              "context7": {
                "url": "https://mcp.context7.com/mcp"
              }
            }
          }
          EOF

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            1. Соответствие стандартам кода из CLAUDE.md
            2. TypeScript type safety (strict mode)
            3. Потенциальные баги и edge cases
            4. Правильность использования API библиотек (Supabase, grammY, Hono)
            5. Привязка коммитов к GitHub Issues

            Пиши review на русском языке.
            Используй Context7 MCP для проверки актуальности API вызовов библиотек.
          claude_args: |
            --model claude-sonnet-4-6
            --mcp-config ${{ runner.temp }}/mcp-config.json
            --allowedTools mcp__context7__resolve-library-id,mcp__context7__get-library-docs
