name: Claude Interactive

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  claude:
    if: >-
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create MCP config
        run: |
          cat > "$RUNNER_TEMP/mcp-config.json" << 'EOF'
          {
            "mcpServers": {
              "context7": {
                "url": "https://mcp.context7.com/mcp"
              }
            }
          }
          EOF

      - name: Claude Interactive
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: |
            --model claude-sonnet-4-6
            --mcp-config ${{ runner.temp }}/mcp-config.json
            --allowedTools mcp__context7__resolve-library-id,mcp__context7__get-library-docs
